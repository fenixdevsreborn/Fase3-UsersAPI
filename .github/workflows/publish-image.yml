# ------------------------------------------------------------------------------
# Publish image — FCG Cloud Platform (microsserviço)
# Build da imagem Docker, push no ECR com tag "latest" apenas.
# Repositório ECR por serviço (ex.: fcg/fase03-users-api) para identificar a origem.
# ------------------------------------------------------------------------------

name: Publish image

on:
  push:
    branches: [junonn/mvp-aws]

env:
  SERVICE_NAME: users-api
  DOTNET_VERSION: "10.0.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # obrigatório para OIDC com AWS
      contents: read

    outputs:
      image_uri: ${{ steps.meta.outputs.tags }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Autenticação na AWS via OIDC (sem access key; role assumida pelo GitHub)
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_ECR }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # 3. Login no ECR (registry disponível em steps.ecr.outputs.registry)
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Definir repositório por serviço (identificável no registro) e tag "latest"
      - name: Docker meta (tags)
        id: meta
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          REPO="${{ vars.ECR_REPOSITORY_NAME || 'fcg/fase03-users-api' }}"
          echo "tags=${REGISTRY}/${REPO}:latest" >> $GITHUB_OUTPUT
          echo "image_tag=latest" >> $GITHUB_OUTPUT

      # 5. Build da imagem (Dockerfile na raiz do repo)
      - name: Build image
        run: docker build -f Dockerfile -t ${{ steps.meta.outputs.tags }} .

      # 6. Push da imagem com tag latest
      - name: Push image
        run: docker push ${{ steps.meta.outputs.tags }}

  # 8. Disparar o orquestrador para atualizar a infra com a nova imagem
  trigger-orchestrator:
    name: Trigger infra orchestrator
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fase3-InfraOrchestrador
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORCHESTRATOR_REPO_TOKEN }}
          repository: ${{ vars.ORCHESTRATOR_REPO }}
          event-type: deploy-request
          client-payload: |
            {
              "service_name": "${{ vars.SERVICE_NAME || 'users-api' }}",
              "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "image_uri": "${{ needs.build-and-push.outputs.image_uri }}",
              "commit_sha": "${{ github.sha }}",
              "environment": "${{ vars.ENVIRONMENT || 'prod' }}"
            }
